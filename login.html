<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>پنل مدیریت فروشگاه اکبری</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { font-family: Arial, Tahoma, sans-serif; padding: 20px; background: #f4f4f4; direction: rtl; }
    .admin-container { max-width: 1000px; margin: 0 auto; }
    .login-box { max-width: 400px; margin: 100px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
    .login-box input { width: 100%; padding: 10px; margin: 15px 0; border: 1px solid #ccc; border-radius: 8px; font-family: inherit; text-align: center; box-sizing: border-box; }
    .order-card, .form-card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: right; }
    .order-card { border-right: 5px solid #ff3b30; }
    .form-card { border-right: 5px solid #2ecc71; }
    .order-header { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 10px; }
    .order-items { background: #f9f9f9; padding: 10px; border-radius: 8px; font-size: 0.9rem; margin: 10px 0; }
    .btn-clear { background-color: #ff3b30; color: white; padding: 10px 20px; font-size: 1rem; font-weight: bold; border-radius: 8px; margin-bottom: 20px; border: none; cursor: pointer;}
    .btn-done { background-color: #2ecc71; color: white; margin-top: 10px; padding: 10px; width: 100%; border-radius: 8px; border: none; cursor: pointer; font-weight: bold;}
    .price-details { background: #eef9f1; padding: 10px; border-radius: 6px; margin-top: 10px; font-size: 0.95rem; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; margin-bottom: 4px; font-weight: bold; font-size: 0.9rem; }
    .form-group input, .form-group textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; font-family: inherit; box-sizing: border-box; }
    .product-list-item { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #eee; padding: 10px 0; gap: 10px; }
    .btn-delete-prod { background-color: #ff3b30; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 0.85rem; cursor: pointer; }
    .btn-delete-prod:disabled, .btn-done:disabled { opacity: 0.5; cursor: not-allowed; }
    .section-title-row { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .badge-count { background: #eee; color: #444; border-radius: 20px; padding: 2px 10px; font-size: 0.85rem; }
    .btn-refresh { background: #eee; border: none; border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 0.85rem; }
    #image-preview { display: none; margin-top: 8px; max-width: 120px; max-height: 120px; border-radius: 8px; object-fit: cover; }
    .search-box { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; margin-bottom: 12px; box-sizing: border-box; font-family: inherit; }
  </style>
</head>
<body>

<div id="login-section" class="login-box">
  <h2>🔒 ورود به پنل مدیریت دکان</h2>
  <input type="email" id="admin-email" placeholder="ایمیل" autocomplete="username">
  <input type="password" id="admin-password" placeholder="رمز عبور" autocomplete="current-password">
  <button id="login-btn" onclick="checkPassword()" style="background-color: #ff3b30; color:white; width:100%; border-radius:8px; padding:10px; border:none; cursor:pointer;">ورود به سیستم</button>
  <p id="login-error" style="color:#ff3b30; font-size:0.85rem; margin-top:10px; display:none;"></p>
</div>

<div id="admin-section" class="admin-container" style="display: none;">
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <h1>⚙️ پنل مدیریت فروشگاه اکبری</h1>
    <button onclick="logoutAdmin()" style="background:#eee; border:none; border-radius:8px; padding:8px 14px; cursor:pointer; font-size:0.85rem; white-space:nowrap;">🚪 خروج</button>
  </div>
  <a href="index.html" style="text-decoration: none; font-weight: bold; color: #555;">⬅ بازگشت به فروشگاه</a>
  <br><br>

  <div class="form-card">
    <h2>➕ افزودن محصول جدید به دکان (آنلاین)</h2>
    <form id="product-form" onsubmit="addNewProduct(event)">
      <div class="form-group">
        <label>نام محصول:</label>
        <input type="text" id="p-title" required placeholder="مثال: لوبیا وطنی درجه یک">
      </div>

      <div class="form-group" style="background: #f0f3f1; padding: 10px; border-radius: 8px;">
        <label>📸 انتخاب عکس محصول از حافظه گوشی:</label>
        <input type="file" id="p-image-file" accept="image/*" required style="margin-top: 5px;" onchange="previewImage(event)">
        <img id="image-preview" alt="پیش‌نمایش عکس">
      </div>

      <div class="form-group">
        <label>توضیحات کوتاه:</label>
        <textarea id="p-desc" rows="2" placeholder="توضیحات درباره کیفیت یا بسته‌بندی..."></textarea>
      </div>

      <div style="background: #f9f9f9; padding: 10px; border-radius: 8px; margin-bottom: 12px;">
        <strong>تنظیم واحد اول (ضروری):</strong>
        <div style="display: flex; gap: 10px; margin-top: 5px;">
          <input type="text" id="p-unit1-name" required placeholder="نام واحد (مثلا: بوجی ۵۰ کیلویی)" style="flex:2; padding:8px; border-radius:6px; border:1px solid #ccc;">
          <input type="number" id="p-unit1-price" required min="1" step="1" placeholder="قیمت (افغانی)" style="flex:1; padding:8px; border-radius:6px; border:1px solid #ccc;">
        </div>
      </div>

      <div style="background: #f9f9f9; padding: 10px; border-radius: 8px; margin-bottom: 12px;">
        <strong>تنظیم واحد دوم (اختیاری):</strong>
        <div style="display: flex; gap: 10px; margin-top: 5px;">
          <input type="text" id="p-unit2-name" placeholder="نام واحد (مثلا: کیلوگرم)" style="flex:2; padding:8px; border-radius:6px; border:1px solid #ccc;">
          <input type="number" id="p-unit2-price" min="1" step="1" placeholder="قیمت (افغانی)" style="flex:1; padding:8px; border-radius:6px; border:1px solid #ccc;">
        </div>
      </div>

      <button type="submit" style="background-color: #2ecc71; color: white; width: 100%; padding: 10px; border-radius: 6px; font-weight: bold; border: none; cursor: pointer;">🚀 آپلود عکس و اضافه کردن به دکان</button>
    </form>
  </div>

  <div class="form-card" style="border-right: 5px solid #ff9500;">
    <div class="section-title-row">
      <h2>📦 لیست اجناس موجود در دکان آنلاین <span id="product-count" class="badge-count"></span></h2>
      <button class="btn-refresh" onclick="displayAdminProducts()">🔄 بروزرسانی</button>
    </div>
    <input type="text" id="product-search" class="search-box" placeholder="جستجوی نام جنس..." oninput="filterProducts()">
    <div id="admin-products-list">در حال بارگذاری اجناس...</div>
  </div>

  <div class="section-title-row">
    <h2>📦 سفارش‌های دریافتی مشتریان (زنده) <span id="order-count" class="badge-count"></span></h2>
    <button class="btn-refresh" onclick="displayOrders()">🔄 بروزرسانی</button>
  </div>
  <div id="orders-list">در حال بارگذاری سفارشات...</div>
  <br>
  <button class="btn-clear" onclick="clearAllOrders()">🗑️ پاک کردن کل تاریخچه سفارش‌ها</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://affstedmdsqeobtzrkyp.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_-6pETy_IFfTgZqN-ePvKeg_CIil3GUK";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const MAX_IMAGE_SIZE_BYTES = 5 * 1024 * 1024; // 5MB
let allProductsCache = [];

// جلوگیری از نمایش متن کاربر به صورت HTML خام (محافظت در برابر XSS)
function escapeHtml(value) {
  if (value === null || value === undefined) return "";
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function showAdminPanel() {
  document.getElementById("login-section").style.display = "none";
  document.getElementById("admin-section").style.display = "block";
  displayOrders();
  displayAdminProducts();
}

function showLoginScreen() {
  document.getElementById("admin-section").style.display = "none";
  document.getElementById("login-section").style.display = "block";
}

// ورود واقعی با ایمیل و رمز عبور از طریق Supabase Auth
async function checkPassword() {
  let email = document.getElementById("admin-email").value.trim();
  let password = document.getElementById("admin-password").value;
  let loginBtn = document.getElementById("login-btn");
  let errorEl = document.getElementById("login-error");
  errorEl.style.display = "none";

  if (!email || !password) {
    errorEl.textContent = "لطفاً ایمیل و رمز عبور را وارد کنید.";
    errorEl.style.display = "block";
    return;
  }

  loginBtn.disabled = true;
  loginBtn.innerText = "در حال ورود...";

  try {
    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if (error) {
      errorEl.textContent = "ورود ناموفق بود: نام کاربری یا رمز عبور اشتباه است.";
      errorEl.style.display = "block";
    } else {
      document.getElementById("admin-password").value = "";
      showAdminPanel();
    }
  } catch (err) {
    errorEl.textContent = "خطای ارتباط با سرور: " + err.message;
    errorEl.style.display = "block";
  } finally {
    loginBtn.disabled = false;
    loginBtn.innerText = "ورود به سیستم";
  }
}

async function logoutAdmin() {
  if (!confirm("آیا می‌خواهید از پنل مدیریت خارج شوید؟")) return;
  await supabaseClient.auth.signOut();
  showLoginScreen();
}

// در زمان بارگذاری صفحه چک می‌کنیم که نشست (session) فعال از قبل وجود دارد یا نه
// تا با هر بار رفرش کردن صفحه نیاز به ورود مجدد نباشد
async function initAuthState() {
  const { data } = await supabaseClient.auth.getSession();
  if (data && data.session) {
    showAdminPanel();
  } else {
    showLoginScreen();
  }
}

// اگر نشست منقضی شود یا کاربر در تب دیگری خارج شود، پنل را قفل می‌کنیم
supabaseClient.auth.onAuthStateChange((event, session) => {
  if (event === "SIGNED_OUT") {
    showLoginScreen();
  }
});

initAuthState();

// پیش‌نمایش عکس قبل از آپلود
function previewImage(event) {
  let file = event.target.files[0];
  let preview = document.getElementById("image-preview");
  if (!file) {
    preview.style.display = "none";
    return;
  }
  if (file.size > MAX_IMAGE_SIZE_BYTES) {
    alert("حجم عکس بیشتر از ۵ مگابایت است. لطفاً عکس کوچک‌تری انتخاب کنید.");
    event.target.value = "";
    preview.style.display = "none";
    return;
  }
  let reader = new FileReader();
  reader.onload = (e) => {
    preview.src = e.target.result;
    preview.style.display = "block";
  };
  reader.readAsDataURL(file);
}

// فیلتر کردن لیست محصولات بر اساس جستجو
function filterProducts() {
  let term = document.getElementById("product-search").value.trim().toLowerCase();
  let filtered = allProductsCache.filter(p => {
    let name = (p.Name || p.title || "").toLowerCase();
    return name.includes(term);
  });
  renderProductsList(filtered);
}

// بارگذاری اجناس از جدول دیتابیس سوپابیس
async function displayAdminProducts() {
  let adminProdListDiv = document.getElementById("admin-products-list");
  if (!adminProdListDiv) return;
  adminProdListDiv.innerHTML = "در حال دریافت کالاها...";

  try {
    const { data: products, error } = await supabaseClient.from('Products').select('*');

    if (error) {
      adminProdListDiv.innerHTML = "<p style='color:red;'>خطا در لود محصولات: " + escapeHtml(error.message) + "</p>";
      return;
    }

    allProductsCache = products || [];
    document.getElementById("product-count").textContent = allProductsCache.length;
    renderProductsList(allProductsCache);
  } catch (err) {
    adminProdListDiv.innerHTML = "<p style='color:red;'>خطای ارتباط با سرور: " + escapeHtml(err.message) + "</p>";
  }
}

function renderProductsList(products) {
  let adminProdListDiv = document.getElementById("admin-products-list");

  if (!products || products.length === 0) {
    adminProdListDiv.innerHTML = "<p style='color:#888;'>هیچ محصولی پیدا نشد.</p>";
    return;
  }

  adminProdListDiv.innerHTML = "";
  products.forEach(p => {
    let unitsText = "";
    if (p.units) {
      let parsedUnits = typeof p.units === 'string' ? JSON.parse(p.units) : p.units;
      unitsText = parsedUnits.map(u => `${escapeHtml(u.name)}: ${escapeHtml(u.price)} افغانی`).join(" | ");
    } else {
      unitsText = `${escapeHtml(p.Price || p.price || 0)} افغانی`;
    }

    let imgSrc = escapeHtml(p.Image_URL || p.image || p.image_url || "");
    let name = escapeHtml(p.Name || p.title || "بدون نام");

    adminProdListDiv.innerHTML += `
      <div class="product-list-item">
        <div style="display: flex; align-items: center; gap: 10px;">
          <img src="${imgSrc}" style="width: 50px; height: 50px; border-radius: 6px; object-fit: cover;" loading="lazy" onerror="this.style.opacity=0.3">
          <div>
            <strong style="font-size: 0.95rem;">${name}</strong>
            <p style="margin: 3px 0 0 0; font-size: 0.8rem; color: #666;">${unitsText}</p>
          </div>
        </div>
        <button onclick="deleteProduct(${p.id}, this)" class="btn-delete-prod">🗑️ حذف جنس</button>
      </div>
    `;
  });
}

// حذف محصول از دیتابیس سوپابیس
async function deleteProduct(id, btnEl) {
  if (!confirm("آیا مطمئن هستید که می‌خواهید این جنس را از دکان آنلاین کاملاً حذف کنید؟")) return;

  if (btnEl) { btnEl.disabled = true; btnEl.innerText = "در حال حذف..."; }

  try {
    const { error } = await supabaseClient.from('Products').delete().eq('id', id);
    if (error) {
      alert("خطا در حذف محصول: " + error.message);
      if (btnEl) { btnEl.disabled = false; btnEl.innerText = "🗑️ حذف جنس"; }
    } else {
      displayAdminProducts();
    }
  } catch (err) {
    alert("خطای ارتباط با سرور: " + err.message);
    if (btnEl) { btnEl.disabled = false; btnEl.innerText = "🗑️ حذف جنس"; }
  }
}

// تابع خواندن عکس از حافظه گوشی و آپلود در استورج سوپابیس
async function addNewProduct(event) {
  event.preventDefault();

  let submitBtn = document.querySelector("#product-form button[type='submit']");
  let fileInput = document.getElementById("p-image-file");

  if (!fileInput || fileInput.files.length === 0) {
    alert("لطفاً ابتدا یک عکس از حافظه داخلی گوشی انتخاب کنید!");
    return;
  }

  let file = fileInput.files[0];

  if (file.size > MAX_IMAGE_SIZE_BYTES) {
    alert("حجم عکس بیشتر از ۵ مگابایت است. لطفاً عکس کوچک‌تری انتخاب کنید.");
    return;
  }

  let title = document.getElementById("p-title").value.trim();
  let unit1Name = document.getElementById("p-unit1-name").value.trim();
  let unit1Price = parseInt(document.getElementById("p-unit1-price").value, 10);

  if (!title) {
    alert("لطفاً نام محصول را وارد کنید.");
    return;
  }
  if (!unit1Name || isNaN(unit1Price) || unit1Price <= 0) {
    alert("لطفاً نام و قیمت معتبر برای واحد اول وارد کنید (قیمت باید عددی بزرگ‌تر از صفر باشد).");
    return;
  }

  let unit2Name = document.getElementById("p-unit2-name").value.trim();
  let unit2PriceRaw = document.getElementById("p-unit2-price").value;
  let unit2Price = parseInt(unit2PriceRaw, 10);
  if (unit2Name && (unit2PriceRaw === "" || isNaN(unit2Price) || unit2Price <= 0)) {
    alert("اگر واحد دوم را وارد می‌کنید، قیمت آن نیز باید عددی بزرگ‌تر از صفر باشد.");
    return;
  }

  submitBtn.disabled = true;
  submitBtn.innerText = "⏳ در حال آپلود عکس از حافظه گوشی...";

  let fileName = Date.now() + "_" + file.name.replace(/[^a-zA-Z0-9.\-_]/g, "_");

  try {
    // آپلود مستقیم فایل گوشی به باکت استورج سوپابیس
    const { data: storageData, error: storageError } = await supabaseClient
      .storage
      .from('product-images')
      .upload(fileName, file);

    if (storageError) {
      alert("خطا در بخش استورج سوپابیس: " + storageError.message);
      submitBtn.disabled = false;
      submitBtn.innerText = "🚀 آپلود عکس و اضافه کردن به دکان";
      return;
    }

    // گرفتن لینک مستقیم عکسِ آپلود شده
    const { data: urlData } = supabaseClient
      .storage
      .from('product-images')
      .getPublicUrl(fileName);

    let finalImageUrl = urlData.publicUrl;
    let desc = document.getElementById("p-desc").value.trim();

    let unitsArray = [
      { name: unit1Name, price: unit1Price }
    ];
    if (unit2Name && unit2Price > 0) {
      unitsArray.push({ name: unit2Name, price: unit2Price });
    }

    // ذخیره اطلاعات نهایی به همراه لینک عکس استورج در دیتابیس
    const { error: tableError } = await supabaseClient.from('Products').insert([
      {
        Name: title,
        Image_URL: finalImageUrl,
        description: desc,
        units: unitsArray
      }
    ]);

    if (tableError) {
      alert("عکس آپلود شد ولی در ثبت اطلاعات جدول خطا رخ داد: " + tableError.message);
    } else {
      alert("موفقیت‌آمیز! عکس از گوشی آپلود شد و جنس جدید به دکان آنلاین اضافه گردید.");
      document.getElementById("product-form").reset();
      document.getElementById("image-preview").style.display = "none";
      displayAdminProducts();
    }
  } catch (err) {
    alert("خطای غیرمنتظره: " + err.message);
  } finally {
    submitBtn.disabled = false;
    submitBtn.innerText = "🚀 آپلود عکس و اضافه کردن به دکان";
  }
}

// بارگذاری لیست سفارش‌های زنده مشتریان از دیتابیس
async function displayOrders() {
  let ordersListDiv = document.getElementById("orders-list");
  if (!ordersListDiv) return;
  ordersListDiv.innerHTML = "در حال بارگذاری فاکتورها...";

  try {
    const { data: orders, error } = await supabaseClient.from('Customer_Order').select('*').order('id', { ascending: false });

    if (error) {
      ordersListDiv.innerHTML = "<p style='color:red;'>خطا در دریافت سفارش‌ها: " + escapeHtml(error.message) + "</p>";
      return;
    }

    document.getElementById("order-count").textContent = orders ? orders.length : 0;

    if (!orders || orders.length === 0) {
      ordersListDiv.innerHTML = "<h3 style='color: #888;'>هیچ سفارش جدیدی ثبت نشده است.</h3>";
      return;
    }

    ordersListDiv.innerHTML = "";
    orders.forEach((order) => {
      ordersListDiv.innerHTML += `
        <div class="order-card">
          <div class="order-header">
            <strong>👤 فاکتور شماره: #${escapeHtml(order.id)}</strong>
            <span style="color: #666; font-size: 0.85rem;">📞 تلفن: ${escapeHtml(order.Phone)}</span>
          </div>
          <div class="order-items">
            <strong>🛒 لیست اجناس درخواستی:</strong>
            <p style="margin-top:5px; white-space: pre-line;">${escapeHtml(order.Items)}</p>
          </div>
          <div class="price-details">
            <h3 style="margin: 0; color: #2ecc71;">💰 جمع کل فاکتور: ${escapeHtml(order.Total_Price)} افغانی</h3>
          </div>
          <button class="btn-done" onclick="completeOrder(${order.id}, this)">✓ تکمیل و بایگانی فاکتور</button>
        </div>
      `;
    });
  } catch (err) {
    ordersListDiv.innerHTML = "<p style='color:red;'>خطای ارتباط با سرور: " + escapeHtml(err.message) + "</p>";
  }
}

// حذف یا تکمیل سفارش از دیتابیس
async function completeOrder(id, btnEl) {
  if (!confirm("آیا این سفارش تحویل داده شده و از لیست حذف شود؟")) return;

  if (btnEl) { btnEl.disabled = true; btnEl.innerText = "در حال ثبت..."; }

  try {
    const { error } = await supabaseClient.from('Customer_Order').delete().eq('id', id);
    if (error) {
      alert("خطا در حذف سفارش: " + error.message);
      if (btnEl) { btnEl.disabled = false; btnEl.innerText = "✓ تکمیل و بایگانی فاکتور"; }
    } else {
      displayOrders();
    }
  } catch (err) {
    alert("خطای ارتباط با سرور: " + err.message);
    if (btnEl) { btnEl.disabled = false; btnEl.innerText = "✓ تکمیل و بایگانی فاکتور"; }
  }
}

// پاک کردن کل سفارشات
async function clearAllOrders() {
  if (!confirm("آیا مطمئن هستید که می‌خواهید تمام سفارشات کل دیتابیس را پاک کنید؟ این عمل قابل بازگشت نیست.")) return;

  try {
    const { error } = await supabaseClient.from('Customer_Order').delete().neq('id', 0);
    if (error) {
      alert("خطا: " + error.message);
    } else {
      displayOrders();
    }
  } catch (err) {
    alert("خطای ارتباط با سرور: " + err.message);
  }
}
