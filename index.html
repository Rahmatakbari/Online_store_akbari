<!DOCTYPE html>
<html lang="fa">
<head>
<link rel="manifest" href="manifest.json">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>فروشگاه مواد غذایی اکبری</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      background: #f4f5f7;
      direction: rtl;
      padding-bottom: 70px;
    }

    .dk-header {
      background: #fff;
      padding: 12px 16px 8px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .dk-header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .dk-logo-red {
      color: #ef4056;
      font-size: 1.1rem;
      font-weight: bold;
    }
    .dk-notification-icon {
      font-size: 1.3rem;
      cursor: pointer;
    }
    .dk-search-box {
      display: flex;
      align-items: center;
      background: #f4f5f7;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 8px 12px;
      gap: 8px;
    }
    .dk-search-box input {
      border: none;
      background: transparent;
      font-size: 0.9rem;
      width: 100%;
      outline: none;
      text-align: right;
      direction: rtl;
      font-family: inherit;
    }

    .category-wrapper {
      padding: 10px 12px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      white-space: nowrap;
      direction: rtl;
      -webkit-overflow-scrolling: touch;
      background: #fff;
      border-bottom: 1px solid #eee;
    }
    .category-wrapper::-webkit-scrollbar { display: none; }
    .category-btn {
      padding: 7px 14px;
      border: 1.5px solid #ddd;
      border-radius: 20px;
      background: white;
      color: #444;
      font-family: inherit;
      font-size: 0.82rem;
      cursor: pointer;
      transition: 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .category-btn.active {
      background: #ef4056;
      color: white;
      font-weight: bold;
      border-color: #ef4056;
    }

    .dk-promo-banner {
      background: linear-gradient(135deg, #ef4056, #ff6b35);
      color: white;
      text-align: center;
      padding: 10px 16px;
      font-size: 0.85rem;
      font-weight: bold;
    }

    .dk-container { padding: 12px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
      content-visibility: auto;
    }

    .product-card {
      background: #fff;
      border: 1px solid #e8e8ee;
      border-radius: 14px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      transition: box-shadow 0.2s;
    }
    .product-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.10); }

    .product-card img {
      width: 100%;
      height: 130px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 8px;
      background: #f0f0f0;
    }
    .product-card h3 {
      font-size: 0.9rem;
      color: #2c2f4a;
      margin-bottom: 4px;
      font-weight: bold;
      line-height: 1.4;
    }
    .product-card .desc {
      font-size: 0.78rem;
      color: #888;
      margin-bottom: 6px;
      min-height: 20px;
    }

    .price-display {
      font-size: 0.85rem;
      font-weight: bold;
      color: #ef4056;
      margin-bottom: 8px;
      text-align: left;
      direction: ltr;
    }
    .price-display span {
      font-size: 0.72rem;
      color: #888;
      font-weight: normal;
    }

    .unit-selector {
      width: 100%;
      padding: 7px 8px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.82rem;
      background: #f9f9fb;
      margin-bottom: 8px;
      outline: none;
      font-family: inherit;
      direction: rtl;
      text-align: right;
      cursor: pointer;
    }
    .unit-selector:focus { border-color: #ef4056; }

    .btn-add-to-cart {
      background: #ef4056;
      color: white;
      border: none;
      padding: 9px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s, transform 0.1s;
      font-family: inherit;
    }
    .btn-add-to-cart:hover { background: #d32f2f; }
    .btn-add-to-cart:active { transform: scale(0.97); }
    .btn-add-to-cart.added { background: #4caf50; }

    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #323232;
      color: white;
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 0.88rem;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .stock-badge {
      display: inline-block;
      font-size: 0.7rem;
      padding: 2px 7px;
      border-radius: 10px;
      margin-bottom: 6px;
      font-weight: bold;
    }
    .in-stock { background: #e8f5e9; color: #388e3c; }
    .out-of-stock { background: #ffebee; color: #c62828; }

    .empty-msg {
      grid-column: 1 / -1;
      text-align: center;
      color: #aaa;
      padding: 50px 20px;
      font-size: 0.95rem;
    }

    .dk-bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0; right: 0;
      background: #fff;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 8px 0 10px;
      border-top: 1px solid #eee;
      z-index: 200;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.06);
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      color: #888;
      font-size: 0.72rem;
      gap: 2px;
      cursor: pointer;
      position: relative;
    }
    .nav-item.active { color: #ef4056; }
    .nav-icon { font-size: 1.3rem; }
    .nav-text { font-size: 0.72rem; }
    #cart-badge {
      position: absolute;
      top: -2px;
      right: -6px;
      background: #ef4056;
      color: white;
      font-size: 0.68rem;
      font-weight: bold;
      border-radius: 50%;
      min-width: 17px;
      height: 17px;
      text-align: center;
      line-height: 17px;
      padding: 0 3px;
      display: none;
    }

    .loading-msg {
      grid-column: 1 / -1;
      text-align: center;
      padding: 50px;
      color: #aaa;
      font-size: 0.95rem;
    }
    .spinner {
      display: inline-block;
      width: 28px; height: 28px;
      border: 3px solid #eee;
      border-top-color: #ef4056;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header class="dk-header">
  <div class="dk-header-row">
    <div class="dk-logo-area">
      <span class="dk-logo-red">🛒 اکبری خوراکه فروشی</span>
    </div>
    <div class="dk-notification-icon">🔔</div>
  </div>
  <div class="dk-search-box">
    <span>🔍</span>
    <input id="search" onkeyup="searchProducts()" placeholder="جستجو در اجناس دکان اکبری...">
  </div>
</header>

<div class="category-wrapper">
  <button class="category-btn active" onclick="filterByCategory('all', this)">همه اجناس</button>
  <button class="category-btn" onclick="filterByCategory('آرد', this)">🌾 آرد</button>
  <button class="category-btn" onclick="filterByCategory('روغن', this)">💧 روغن</button>
  <button class="category-btn" onclick="filterByCategory('حبوبات', this)">🫘 حبوبات</button>
  <button class="category-btn" onclick="filterByCategory('ماکارونی', this)">🍝 ماکارونی</button>
  <button class="category-btn" onclick="filterByCategory('شیر', this)">🥛 لبنیات</button>
</div>

<div class="dk-promo-banner">
  🔥 تخفیف ویژه: آرد درجه یک و روغن مایع با قیمت منصفانه!
</div>

<div class="dk-container">
  <div class="grid" id="list">
    <div class="loading-msg">
      <div class="spinner"></div><br>در حال بارگذاری اجناس...
    </div>
  </div>
</div>

<nav class="dk-bottom-nav">
  <a href="index.html" class="nav-item active">
    <span class="nav-icon">🏠</span>
    <span class="nav-text">خانه</span>
  </a>
  <a href="cart.html" class="nav-item" style="position:relative;">
    <span class="nav-icon">🛒</span>
    <span id="cart-badge">0</span>
    <span class="nav-text">سبد خرید</span>
  </a>
  <a href="orders.html" class="nav-item">
    <span class="nav-icon">📋</span>
    <span class="nav-text">سفارشات من</span>
  </a>
  <div class="nav-item" id="user-profile-toggle" onclick="handleAuthAction()">
    <span class="nav-icon" id="user-avatar-icon">👤</span>
    <span class="nav-text" id="user-welcome">ورود</span>
  </div>
</nav>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = "https://affstedmdsqeobtzrkyp.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_-6pETy_IFfTgZqN-ePvKeg_CIil3GUK";
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let allProducts = [];
  let searchTimeout;

  document.addEventListener("DOMContentLoaded", () => {
    checkUserSession();
    loadOnlineProducts();
    updateCartBadge();
  });

  async function loadOnlineProducts() {
    const listDiv = document.getElementById("list");

    const { data: products, error } = await supabaseClient
      .from('Products')
      .select('*')
      .order('id', { ascending: false });

    if (error) {
      listDiv.innerHTML = `<p class="empty-msg" style="color:#e53935;">⚠️ خطا در دریافت اطلاعات!<br><small>${error.message}</small></p>`;
      return;
    }

    if (!products || products.length === 0) {
      listDiv.innerHTML = `<p class="empty-msg">هیچ محصولی در فروشگاه موجود نیست.</p>`;
      return;
    }

    allProducts = products;
    renderProducts(allProducts);
  }

  function renderProducts(list) {
    const listDiv = document.getElementById("list");
    listDiv.innerHTML = "";

    if (list.length === 0) {
      listDiv.innerHTML = `<p class="empty-msg">😕 هیچ محصولی در این دسته‌بندی یافت نشد.</p>`;
      return;
    }

    list.forEach(p => {
      let parsedUnits = [];
      try {
        parsedUnits = p.units ? (typeof p.units === 'string' ? JSON.parse(p.units) : p.units) : [];
      } catch(e) { parsedUnits = []; }
      

      const firstPrice = parsedUnits.length > 0 ? parsedUnits[0].price : null;

      const optionsHtml = parsedUnits.map((u, idx) =>
        `<option value="${idx}">${u.name} — ${Number(u.price).toLocaleString()} افغانی</option>`
      ).join("");

      const inStock = p.stock === undefined || p.stock === null || p.stock > 0;
      const stockBadge = inStock
        ? `<span class="stock-badge in-stock">✔ موجود</span>`
        : `<span class="stock-badge out-of-stock">✖ ناموجود</span>`;

      const imgSrc = p.Image_URL || `https://placehold.co/150x130/f0f0f0/aaa?text=${encodeURIComponent(p.Name)}`;

      const card = document.createElement('div');
      card.className = 'product-card';
      
      // ✅ اصلاح اصلی: کلیک روی کل بخش محتوای محصول مستقیماً آدرس دقیق را باز می‌کند
      card.innerHTML = `
        <div onclick="if(!event.target.closest('button') && !event.target.closest('select') && !event.target.closest('label')){ window.location.href='product.html?id=${p.id}'; }" style="cursor:pointer;">
          <img
            src="${imgSrc}"
            alt="${p.Name}"
            loading="lazy"
            onerror="this.src='https://placehold.co/150x130/f0f0f0/aaa?text=بدون+تصویر'"
          >
          <h3>${p.Name}</h3>
          <p class="desc">${p.description || ''}</p>
          ${stockBadge}
          ${firstPrice ? `<div class="price-display">${Number(firstPrice).toLocaleString()} <span>افغانی</span></div>` : ''}
        </div>
        <div>
          <label style="font-size:0.73rem;color:#999;display:block;margin-bottom:4px;">واحد فروش:</label>
          <select id="unit-select-${p.id}" class="unit-selector" onchange="updatePrice(${p.id}, this)">
            ${optionsHtml}
          </select>
          <button
            class="btn-add-to-cart"
            id="btn-${p.id}"
            onclick="addToCartClick(${p.id}, '${p.Name.replace(/'/g, "\\'")}')"
            ${!inStock ? 'disabled style="background:#ccc;cursor:not-allowed;"' : ''}
          >
            ${inStock ? '🛒 افزودن به سبد' : '⛔ ناموجود'}
          </button>
        </div>
      `;
      listDiv.appendChild(card);
    });
  }

  function updatePrice(productId, selectEl) {
    const p = allProducts.find(x => x.id === productId);
    if (!p) return;
    try {
      const units = typeof p.units === 'string' ? JSON.parse(p.units) : p.units;
      const selected = units[selectEl.value];
      const priceDiv = selectEl.closest('.product-card').querySelector('.price-display');
      if (priceDiv && selected) {
        priceDiv.innerHTML = `${Number(selected.price).toLocaleString()} <span>افغانی</span>`;
      }
    } catch(e) {}
  }

  function filterByCategory(cat, btn) {
    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filtered = cat === 'all'
      ? allProducts
      : allProducts.filter(p =>
          (p.Name && p.Name.includes(cat)) ||
          (p.description && p.description.includes(cat)) ||
          (p.category && p.category.includes(cat))
        );
    renderProducts(filtered);
  }

  function searchProducts() {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      const q = document.getElementById("search").value.trim().toLowerCase();
      if (!q) { renderProducts(allProducts); return; }
      const filtered = allProducts.filter(p =>
        (p.Name && p.Name.toLowerCase().includes(q)) ||
        (p.description && p.description.toLowerCase().includes(q))
      );
      renderProducts(filtered);
    }, 300);
  }

  function addToCartClick(productId, productTitle) {
    const selectEl = document.getElementById(`unit-select-${productId}`);
    if (!selectEl) return;

    const p = allProducts.find(x => x.id === productId);
    if (!p) return;

    let units;
    try { units = typeof p.units === 'string' ? JSON.parse(p.units) : p.units; }
    catch(e) { return; }

    const selected = units[selectEl.value];

    const cart = JSON.parse(localStorage.getItem("cart_items")) || [];
    const idx = cart.findIndex(item => item.id === productId && item.unitName === selected.name);
    if (idx > -1) {
      cart[idx].qty += 1;
    } else {
      cart.push({ id: productId, title: productTitle, unitName: selected.name, price: selected.price, qty: 1 });
    }
    localStorage.setItem("cart_items", JSON.stringify(cart));
    updateCartBadge();

    const btn = document.getElementById(`btn-${productId}`);
    if (btn) {
      btn.classList.add('added');
      btn.innerText = '✅ اضافه شد!';
      setTimeout(() => {
        btn.classList.remove('added');
        btn.innerText = '🛒 افزودن به سبد';
      }, 1500);
    }

    showToast(`«${productTitle}» به سبد اضافه شد`);
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.innerText = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function updateCartBadge() {
    const badge = document.getElementById("cart-badge");
    if (!badge) return;
    const cart = JSON.parse(localStorage.getItem("cart_items")) || [];
    const total = cart.reduce((s, i) => s + i.qty, 0);
    badge.innerText = total;
    badge.style.display = total > 0 ? 'block' : 'none';
  }

  function checkUserSession() {
    const loggedIn = localStorage.getItem("customer_logged_in") === "true";
    const name = localStorage.getItem("customer_name");
    const welcome = document.getElementById("user-welcome");
    const icon = document.getElementById("user-avatar-icon");
    if (loggedIn && welcome) {
      welcome.innerText = name ? name.substring(0, 8) : "خروج";
      welcome.style.color = "#ef4056";
      if (icon) icon.innerText = "🚪";
    }
  }

  function handleAuthAction() {
    if (localStorage.getItem("customer_logged_in") === "true") {
      if (confirm("آیا می‌خواهید از حساب خارج شوید؟")) {
        localStorage.clear();
        window.location.reload();
      }
    } else {
      window.location.href = "login.html";
    }
  }
  if ("serviceWorker" in navigator) {
  window.addEventListener("load", function() {
    navigator.serviceWorker
      .register("sw.js")
      .then(res => console.log("سرویس ورکر فعال شد"))
      .catch(err => console.log("خطا در فعال‌سازی", err));
  });
}

</script>
</body>
</html>
