<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>سفارشات من - دکان اکبری</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { font-family: Tahoma, sans-serif; padding: 15px; background: #f4f4f4; direction: rtl; padding-bottom: 80px; }

    .order-card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 12px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      border-right: 5px solid #2ecc71;
      text-align: right;
    }

    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 8px;
      border-bottom: 1px dashed #eee;
      padding-bottom: 8px;
      gap: 8px;
      flex-wrap: wrap;
    }

    .order-number {
      background: #2ecc71;
      color: white;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 0.9rem;
    }

    .order-date {
      color: #999;
      font-size: 0.8rem;
    }

    .order-items {
      font-size: 0.9rem;
      color: #333;
      white-space: pre-line;
      line-height: 1.8;
    }

    .order-price {
      font-weight: bold;
      color: #2ecc71;
      margin-top: 10px;
      font-size: 1rem;
      text-align: left;
      direction: ltr;
    }

    .phone-box {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      margin-bottom: 15px;
      text-align: center;
    }

    .phone-box p {
      color: #555;
      margin-bottom: 12px;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .phone-box input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-family: inherit;
      text-align: center;
      box-sizing: border-box;
      margin: 8px 0;
      font-size: 1rem;
      direction: ltr;
    }

    .phone-box input:focus {
      outline: none;
      border-color: #2ecc71;
      box-shadow: 0 0 0 3px rgba(46,204,113,0.15);
    }

    .phone-box button {
      width: 100%;
      padding: 13px;
      background: #2ecc71;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      font-size: 1rem;
      margin-top: 4px;
      transition: background 0.2s;
    }

    .phone-box button:hover { background: #27ae60; }

    .loading-msg {
      text-align: center;
      color: #888;
      padding: 30px 0;
      font-size: 0.95rem;
    }

    .empty-msg {
      text-align: center;
      color: #aaa;
      padding: 40px 0;
      font-size: 0.95rem;
      line-height: 2;
    }

    .empty-msg .emoji { font-size: 2.5rem; display: block; margin-bottom: 10px; }
  </style>
</head>
<body>

<div style="max-width: 600px; margin: 0 auto;">
  <h2 style="margin-bottom: 4px;">📋 سفارشات من</h2>
  <a href="index.html" style="text-decoration: none; color: #555; font-size: 0.9rem; font-weight: bold;">⬅ بازگشت به فروشگاه</a>
  <br><br>

  <!-- بخش ورود شماره تلفن -->
  <div id="phone-entry-section" class="phone-box" style="display:none;">
    <p>برای دیدن سفارش‌هایت، شماره تلفنی که هنگام ثبت سفارش وارد کرده بودی را بنویس:</p>
    <input type="tel" id="phone-input" placeholder="مثال: 0700000000" inputmode="numeric">
    <button onclick="submitPhone()">نمایش سفارش‌های من</button>
    <p id="phone-error" style="color:#ff3b30; font-size:0.85rem; display:none; margin-top:8px;"></p>
  </div>

  <!-- نمایش شماره وارد شده (فقط اطلاعاتی، بدون گزینه تغییر) -->
  <div id="phone-info-bar" style="display:none; background:#fff; border-radius:10px; padding:10px 15px; margin-bottom:12px; box-shadow:0 1px 4px rgba(0,0,0,0.06); font-size:0.85rem; color:#666; text-align:center;">
    📞 نمایش سفارشات برای شماره: <strong id="shown-phone" style="color:#2ecc71; direction:ltr; display:inline-block;"></strong>
  </div>

  <!-- لیست سفارشات -->
  <div id="orders-list-container"></div>
</div>

<nav class="dk-bottom-nav">
  <a href="index.html" class="nav-item">
    <span class="nav-icon">🏠</span>
    <span class="nav-text">خانه</span>
  </a>
  <a href="cart.html" class="nav-item">
    <span class="nav-icon">🛒</span>
    <span class="nav-text">سبد خرید</span>
  </a>
  <a href="orders.html" class="nav-item active">
    <span class="nav-icon">📋</span>
    <span class="nav-text">سفارشات من</span>
  </a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = "https://affstedmdsqeobtzrkyp.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_-6pETy_IFfTgZqN-ePvKeg_CIil3GUK";
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const PHONE_STORAGE_KEY = "dk_customer_phone";

  function escapeHtml(value) {
    if (value === null || value === undefined) return "";
    return String(value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  // فرمت تاریخ میلادی به شکل خوانا
  function formatDate(dateStr) {
    if (!dateStr) return "";
    try {
      const d = new Date(dateStr);
      return d.toLocaleDateString("fa-AF", {
        year: "numeric", month: "long", day: "numeric",
        hour: "2-digit", minute: "2-digit"
      });
    } catch {
      return dateStr;
    }
  }

  document.addEventListener("DOMContentLoaded", function () {
    // شماره ذخیره‌شده از checkout یا ورود قبلی
    let savedPhone = localStorage.getItem(PHONE_STORAGE_KEY);
    if (savedPhone) {
      showPhoneInfoBar(savedPhone);
      loadOrdersForPhone(savedPhone);
    } else {
      document.getElementById("phone-entry-section").style.display = "block";
    }
  });

  function showPhoneInfoBar(phone) {
    document.getElementById("phone-info-bar").style.display = "block";
    document.getElementById("shown-phone").textContent = phone;
  }

  function submitPhone() {
    let phone = document.getElementById("phone-input").value.trim();
    let errorEl = document.getElementById("phone-error");
    errorEl.style.display = "none";

    if (!phone || phone.length < 6) {
      errorEl.textContent = "لطفاً شماره تلفن معتبر وارد کن.";
      errorEl.style.display = "block";
      return;
    }

    // ذخیره شماره (همین شماره در checkout هم استفاده می‌شود)
    localStorage.setItem(PHONE_STORAGE_KEY, phone);
    document.getElementById("phone-entry-section").style.display = "none";
    showPhoneInfoBar(phone);
    loadOrdersForPhone(phone);
  }

  async function loadOrdersForPhone(phone) {
    let container = document.getElementById("orders-list-container");
    container.innerHTML = '<div class="loading-msg">⏳ در حال بارگذاری سفارشات...</div>';

    try {
      const { data: orders, error } = await supabaseClient
        .rpc('get_orders_by_phone', { customer_phone: phone });

      if (error) {
        container.innerHTML = `<p style="color:red; text-align:center;">خطا در بارگذاری: ${escapeHtml(error.message)}</p>`;
        return;
      }

      if (!orders || orders.length === 0) {
        container.innerHTML = `
          <div class="empty-msg">
            <span class="emoji">📭</span>
            هیچ سفارشی برای این شماره یافت نشد.<br>
            <small>اگر شماره دیگری استفاده کرده‌ای، از پنل ادمین کمک بگیر.</small>
          </div>`;
        return;
      }

      container.innerHTML = "";

      // مرتب‌سازی: جدیدترین اول
      orders.sort((a, b) => b.id - a.id);

      orders.forEach((order, index) => {
        // شماره سفارش: از id دیتابیس (auto-increment) استفاده می‌کنیم
        const orderNum = escapeHtml(order.id);

        // فرمت مبلغ
        const totalFormatted = Number(order.Total_Price || 0).toLocaleString('fa-AF');

        // تاریخ (اگر ستون created_at داری)
        const dateStr = order.created_at ? formatDate(order.created_at) : "";

        container.innerHTML += `
          <div class="order-card">
            <div class="order-header">
              <span class="order-number">سفارش #${orderNum}</span>
              ${dateStr ? `<span class="order-date">🕐 ${escapeHtml(dateStr)}</span>` : ""}
            </div>
            <div class="order-items">${escapeHtml(order.Items || 'جزئیاتی ثبت نشده است')}</div>
            <div class="order-price">💰 ${totalFormatted} افغانی</div>
          </div>
        `;
      });

    } catch (err) {
      container.innerHTML = `<p style="color:red; text-align:center;">خطای ارتباط با سرور: ${escapeHtml(err.message)}</p>`;
    }
  }
</script>

</body>
</html>
